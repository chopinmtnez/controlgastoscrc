<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · ControlGastosCRC</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-title" style="font-size:20px; text-align:center">ControlGastos<br>CRC</div>
      <div class="logo-sub" style="text-align:center; margin-top:4px">Lucía · Curso 25/26</div>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Entrar</button>
    </form>
  </div>
<script>
  document.querySelectorAll('input').forEach(function(input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { document.querySelector('form').requestSubmit(); }
    });
  });
</script>
</body>
</html>
